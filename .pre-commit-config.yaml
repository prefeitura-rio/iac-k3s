repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.4
    hooks:
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
  - repo: local
    hooks:
      - id: fmt
        name: fmt
        language: system
        entry: prefrio fmt
        files: \.tf$
        pass_filenames: false
      - id: check-unencrypted-tfvars
        name: check-unencrypted-tfvars
        language: system
        entry: prefrio check-tfvars terraform/terraform\.tfvars\.json
        pass_filenames: false
        always_run: true
      - id: ruff-lint
        name: ruff lint
        language: system
        entry: ruff check
        types: [python]
        files: ^scripts/
      - id: ruff-format
        name: ruff format
        language: system
        entry: ruff format --check
        types: [python]
        files: ^scripts/
      - id: basedpyright
        name: basedpyright
        language: system
        entry: basedpyright scripts/
        types: [python]
        files: ^scripts/
        pass_filenames: false
